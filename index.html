<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>창원 공기질</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=DM+Mono:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#08080f;
    color:#fff;
    font-family:'Noto Sans KR', sans-serif;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
  }

  /* 배경 글로우 */
  #glow {
    position:fixed; inset:0;
    pointer-events:none; z-index:0;
    transition:background 2s ease;
  }

  /* ── 전체 레이아웃: 3행 ── */
  #app {
    position:relative; z-index:1;
    width:100%; height:100%;
    display:grid;
    grid-template-rows: auto 1fr auto;
    padding: 0;
  }

  /* ── 1행: 헤더 ── */
  #header {
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding: 28px 32px 0;
  }
  #date-block {}
  #date-day  { font-size:16px; color:rgba(255,255,255,.4); font-weight:300; letter-spacing:.08em; }
  #date-full { font-size:32px; font-weight:700; letter-spacing:-.02em; margin-top:2px; }
  #clock-block { text-align:right; }
  #clock { font-family:'DM Mono',monospace; font-size:64px; font-weight:300; line-height:1; letter-spacing:-.04em; }
  #clock-sep { animation:blink 1s step-end infinite; opacity:.35; }
  #location { font-size:12px; color:rgba(255,255,255,.3); margin-top:4px; font-weight:300; }

  /* ── 2행: 메인 콘텐츠 ── */
  #main {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:0;
    align-items:center;
    padding: 0 32px;
  }

  /* 왼쪽: 공기질 */
  #air-panel {
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:0;
  }
  #aqi-grade-label {
    font-size:18px;
    font-weight:500;
    letter-spacing:.12em;
    opacity:.6;
    margin-bottom:4px;
  }
  #aqi-number {
    font-family:'DM Mono',monospace;
    font-size:130px;
    font-weight:700;
    line-height:.9;
    letter-spacing:-.04em;
    transition:color 2s ease;
  }
  #aqi-grade {
    font-size:42px;
    font-weight:900;
    letter-spacing:-.01em;
    margin-top:4px;
    transition:color 2s ease;
  }

  /* PM2.5 */
  #pm-row {
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-top:20px;
  }
  #pm-label { font-size:14px; color:rgba(255,255,255,.4); font-weight:400; }
  #pm25-val {
    font-family:'DM Mono',monospace;
    font-size:38px;
    font-weight:700;
    transition:color 2s ease;
  }
  #pm25-unit { font-size:13px; color:rgba(255,255,255,.4); }
  #pm25-grade { font-size:16px; font-weight:700; margin-left:4px; }

  #pm10-row {
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-top:6px;
  }
  #pm10-label { font-size:13px; color:rgba(255,255,255,.35); font-weight:400; }
  #pm10-val {
    font-family:'DM Mono',monospace;
    font-size:30px;
    font-weight:700;
    color:rgba(255,255,255,.7);
  }
  #pm10-unit  { font-size:12px; color:rgba(255,255,255,.35); }
  #pm10-grade { font-size:14px; font-weight:600; margin-left:4px; }

  /* 오른쪽: 날씨 */
  #weather-panel {
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:0;
  }
  #wx-icon { font-size:64px; line-height:1; }
  #wx-desc { font-size:18px; color:rgba(255,255,255,.5); margin-top:4px; font-weight:300; }
  #wx-temp {
    font-family:'DM Mono',monospace;
    font-size:100px;
    font-weight:300;
    line-height:1;
    letter-spacing:-.04em;
    margin-top:6px;
  }
  #wx-temp sup { font-size:40px; opacity:.5; vertical-align:super; }
  #wx-feels { font-size:16px; color:rgba(255,255,255,.4); margin-top:2px; font-weight:300; }

  /* 날씨 세부 */
  #wx-details {
    display:flex;
    gap:20px;
    margin-top:16px;
    align-items:center;
  }
  .wx-detail {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
  }
  .wx-detail-icon  { font-size:20px; }
  .wx-detail-val   { font-family:'DM Mono',monospace; font-size:20px; font-weight:500; }
  .wx-detail-label { font-size:11px; color:rgba(255,255,255,.35); font-weight:300; }

  /* ── 3행: 하단 (내일 예보 + 푸터) ── */
  #bottom {
    padding: 0 32px 20px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  /* 구분선 */
  .divider {
    width:100%;
    height:1px;
    background:rgba(255,255,255,.08);
  }

  /* 내일 예보 */
  #tomorrow {
    display:flex;
    align-items:center;
    gap:0;
  }
  #tmr-title { font-size:13px; color:rgba(255,255,255,.35); letter-spacing:.1em; font-weight:400; margin-right:16px; white-space:nowrap; }
  #tmr-icon  { font-size:28px; margin-right:10px; }
  #tmr-desc  { font-size:16px; color:rgba(255,255,255,.55); font-weight:300; flex:1; }
  .tmr-temp  { font-family:'DM Mono',monospace; font-size:22px; font-weight:500; }
  #tmr-high  { color:#F67A5B; }
  #tmr-low   { color:#93C5FD; margin-left:12px; }
  #tmr-rain  { font-family:'DM Mono',monospace; font-size:18px; color:#5BCCF6; margin-left:16px; }

  /* 푸터 */
  #footer {
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  #footer-left  { font-size:10px; color:rgba(255,255,255,.2); display:flex; gap:8px; align-items:center; }
  #source-badge { font-size:9px; border-radius:6px; padding:1px 6px; display:none; }
  #footer-right { display:flex; gap:10px; align-items:center; }
  #updated-text { font-size:10px; color:rgba(255,255,255,.2); font-family:'DM Mono',monospace; }
  #refresh-btn  {
    background:none; border:1px solid rgba(255,255,255,.12);
    color:rgba(255,255,255,.3); border-radius:12px;
    padding:3px 10px; cursor:pointer; font-size:10px;
    font-family:'DM Mono',monospace; -webkit-appearance:none;
  }
  #refresh-btn:active { border-color:rgba(255,255,255,.5); color:rgba(255,255,255,.8); }

  /* 로딩 */
  #loading {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px;
    background:#08080f;
  }
  .spinner {
    width:32px; height:32px;
    border:2px solid rgba(255,255,255,.12);
    border-top-color:rgba(255,255,255,.6);
    border-radius:50%;
    animation:spin .9s linear infinite;
  }
  #loading-text { font-size:14px; color:rgba(255,255,255,.35); letter-spacing:.08em; }

  @keyframes blink { 50%{opacity:0} }
  @keyframes spin  { to{transform:rotate(360deg)} }
  @keyframes pop   { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
  .pop { animation:pop .4s ease; }
</style>
</head>
<body>

<div id="glow"></div>
<div id="loading"><div class="spinner"></div><div id="loading-text">데이터 로딩 중…</div></div>

<div id="app" style="opacity:0; transition:opacity .6s ease;">

  <!-- 헤더 -->
  <div id="header">
    <div id="date-block">
      <div id="date-day"></div>
      <div id="date-full"></div>
    </div>
    <div id="clock-block">
      <div id="clock"><span id="hh">--</span><span id="clock-sep">:</span><span id="mm">--</span></div>
      <div id="location">경상남도 창원시 대원동</div>
    </div>
  </div>

  <!-- 메인 -->
  <div id="main">
    <!-- 공기질 -->
    <div id="air-panel">
      <div id="aqi-grade-label">공기질 지수</div>
      <div id="aqi-number">—</div>
      <div id="aqi-grade">—</div>
      <div id="pm-row">
        <span id="pm-label">PM2.5</span>
        <span id="pm25-val">—</span>
        <span id="pm25-unit">㎍/㎥</span>
        <span id="pm25-grade"></span>
      </div>
      <div id="pm10-row">
        <span id="pm10-label">PM10</span>
        <span id="pm10-val">—</span>
        <span id="pm10-unit">㎍/㎥</span>
        <span id="pm10-grade"></span>
      </div>
    </div>

    <!-- 날씨 -->
    <div id="weather-panel">
      <div id="wx-icon">—</div>
      <div id="wx-desc">—</div>
      <div id="wx-temp"><span id="val-temp">—</span><sup>°</sup></div>
      <div id="wx-feels">체감 <span id="val-feels">—</span>°</div>
      <div id="wx-details">
        <div class="wx-detail">
          <div class="wx-detail-icon">💧</div>
          <div class="wx-detail-val"><span id="val-hum">—</span>%</div>
          <div class="wx-detail-label">습도</div>
        </div>
        <div class="wx-detail">
          <div class="wx-detail-icon">🌧</div>
          <div class="wx-detail-val"><span id="val-precip">—</span>㎜</div>
          <div class="wx-detail-label">강수</div>
        </div>
        <div class="wx-detail">
          <div class="wx-detail-icon">💨</div>
          <div class="wx-detail-val"><span id="val-wind">—</span>㎧</div>
          <div class="wx-detail-label">바람</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 하단 -->
  <div id="bottom">
    <div class="divider"></div>
    <!-- 내일 예보 -->
    <div id="tomorrow">
      <div id="tmr-title">내일</div>
      <div id="tmr-icon">—</div>
      <div id="tmr-desc">—</div>
      <span class="tmr-temp" id="tmr-high">—</span>
      <span class="tmr-temp" id="tmr-low">—</span>
      <span id="tmr-rain">—</span>
    </div>
    <div class="divider"></div>
    <!-- 푸터 -->
    <div id="footer">
      <div id="footer-left">
        <span id="station-name"></span>
        <span id="source-badge"></span>
      </div>
      <div id="footer-right">
        <span id="updated-text"></span>
        <button id="refresh-btn" onclick="fetchAll()">↻</button>
      </div>
    </div>
  </div>
</div>

<script>
const WAQI_TOKEN = "bcbd525a5cf17beb6ce3800e18f8238e523c12f2";
const LAT = 35.2271, LON = 128.6817;

/* ── 등급 ── */
const AQI_LV = [
  {max:50,  label:"좋음",    color:"#5BCCF6", glow:"rgba(91,204,246,.2)",  bg:"radial-gradient(ellipse at 60% 30%, rgba(91,204,246,.18) 0%, transparent 65%)"},
  {max:100, label:"보통",    color:"#5BF6A0", glow:"rgba(91,246,160,.2)",  bg:"radial-gradient(ellipse at 60% 30%, rgba(91,246,160,.18) 0%, transparent 65%)"},
  {max:250, label:"나쁨",    color:"#F6C15B", glow:"rgba(246,193,91,.2)",  bg:"radial-gradient(ellipse at 60% 30%, rgba(246,193,91,.18) 0%, transparent 65%)"},
  {max:9999,label:"매우나쁨", color:"#F67A5B", glow:"rgba(246,122,91,.2)",  bg:"radial-gradient(ellipse at 60% 30%, rgba(246,122,91,.18) 0%, transparent 65%)"},
];
const PM25_LV = [{max:15,label:"좋음",color:"#5BCCF6"},{max:35,label:"보통",color:"#5BF6A0"},{max:75,label:"나쁨",color:"#F6C15B"},{max:9999,label:"매우나쁨",color:"#F67A5B"}];
const PM10_LV = [{max:30,label:"좋음",color:"#5BCCF6"},{max:80,label:"보통",color:"#5BF6A0"},{max:150,label:"나쁨",color:"#F6C15B"},{max:9999,label:"매우나쁨",color:"#F67A5B"}];
const getLv = (v, t) => t.find(l => v <= l.max) || t[t.length-1];

function wxCode(c) {
  if (c===0)    return ["☀️","맑음"];
  if (c<=2)     return ["🌤","구름 조금"];
  if (c===3)    return ["☁️","흐림"];
  if (c<=49)    return ["🌫","안개"];
  if (c<=59)    return ["🌦","이슬비"];
  if (c<=69)    return ["🌧","비"];
  if (c<=79)    return ["🌨","눈"];
  if (c<=84)    return ["🌦","소나기"];
  if (c<=99)    return ["⛈","뇌우"];
  return ["🌡","—"];
}

/* ── 계절 평균 폴백 ── */
const SEASONAL = [
  {aqi:75,pm25:22,pm10:52,o3:18,no2:22,hum:62,temp:3, feels:1, precip:0, wind:2.5,wc:3, th:5, tl:-1,tp:0, tc:3},
  {aqi:80,pm25:25,pm10:58,o3:20,no2:23,hum:60,temp:5, feels:2, precip:0, wind:3.0,wc:2, th:7, tl:1, tp:0, tc:2},
  {aqi:85,pm25:28,pm10:65,o3:28,no2:20,hum:58,temp:10,feels:8, precip:2, wind:3.5,wc:61,th:13,tl:5, tp:3, tc:61},
  {aqi:72,pm25:20,pm10:50,o3:35,no2:18,hum:62,temp:16,feels:15,precip:3, wind:3.0,wc:61,th:19,tl:11,tp:5, tc:2},
  {aqi:60,pm25:16,pm10:38,o3:40,no2:16,hum:65,temp:21,feels:21,precip:5, wind:2.5,wc:2, th:24,tl:17,tp:3, tc:2},
  {aqi:45,pm25:12,pm10:28,o3:38,no2:14,hum:72,temp:25,feels:27,precip:8, wind:2.0,wc:80,th:28,tl:22,tp:12,tc:80},
  {aqi:35,pm25:9, pm10:22,o3:32,no2:12,hum:80,temp:28,feels:31,precip:15,wind:2.0,wc:80,th:30,tl:25,tp:18,tc:80},
  {aqi:38,pm25:10,pm10:24,o3:30,no2:13,hum:78,temp:29,feels:33,precip:12,wind:2.5,wc:80,th:31,tl:26,tp:15,tc:80},
  {aqi:48,pm25:13,pm10:32,o3:26,no2:16,hum:68,temp:23,feels:23,precip:4, wind:2.5,wc:2, th:26,tl:19,tp:2, tc:2},
  {aqi:62,pm25:18,pm10:44,o3:20,no2:19,hum:63,temp:17,feels:15,precip:2, wind:3.0,wc:3, th:20,tl:13,tp:1, tc:3},
  {aqi:70,pm25:21,pm10:50,o3:16,no2:22,hum:60,temp:10,feels:7, precip:1, wind:3.5,wc:3, th:13,tl:7, tp:0, tc:2},
  {aqi:78,pm25:24,pm10:56,o3:14,no2:24,hum:62,temp:4, feels:1, precip:0, wind:3.0,wc:3, th:6, tl:1, tp:0, tc:3},
];
const rnd = n => +(((Math.random()-.5)*n).toFixed(1));
const seasonal = () => {
  const b = SEASONAL[new Date().getMonth()];
  return {
    aqi:Math.max(10,Math.round(b.aqi+rnd(18))),
    pm25:Math.max(3,+(b.pm25+rnd(8)).toFixed(0)),
    pm10:Math.max(8,+(b.pm10+rnd(16)).toFixed(0)),
    hum:Math.round(b.hum+rnd(8)), temp:+(b.temp+rnd(3)).toFixed(1),
    feels:+(b.feels+rnd(3)).toFixed(1), precip:Math.max(0,+(b.precip+rnd(3)).toFixed(1)),
    wind:Math.max(0,+(b.wind+rnd(1)).toFixed(1)), wc:b.wc,
    tmrHigh:+(b.th+rnd(3)).toFixed(0), tmrLow:+(b.tl+rnd(3)).toFixed(0),
    tmrPrecip:Math.max(0,+(b.tp+rnd(4)).toFixed(1)), tmrCode:b.tc,
    station:"창원시 대원동", source:"계절 평균",
  };
};

/* ── 시계 ── */
function tick() {
  const n = new Date();
  document.getElementById("hh").textContent = String(n.getHours()).padStart(2,"0");
  document.getElementById("mm").textContent = String(n.getMinutes()).padStart(2,"0");
  const DAYS   = ["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
  const MONTHS = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  document.getElementById("date-day").textContent  = DAYS[n.getDay()];
  document.getElementById("date-full").textContent = `${MONTHS[n.getMonth()]} ${n.getDate()}일`;
}
setInterval(tick, 1000); tick();

/* ── 렌더 ── */
function render(d) {
  const lv  = getLv(d.aqi, AQI_LV);
  const p25 = getLv(d.pm25, PM25_LV);
  const p10 = getLv(d.pm10, PM10_LV);

  document.getElementById("glow").style.background = lv.bg;

  // AQI
  const aqiEl = document.getElementById("aqi-number");
  aqiEl.textContent = d.aqi;
  aqiEl.style.color = lv.color;
  aqiEl.style.filter = `drop-shadow(0 0 30px ${lv.glow})`;
  aqiEl.classList.remove("pop"); void aqiEl.offsetWidth; aqiEl.classList.add("pop");

  const gradeEl = document.getElementById("aqi-grade");
  gradeEl.textContent = lv.label;
  gradeEl.style.color = lv.color;

  // PM
  document.getElementById("pm25-val").textContent   = d.pm25;
  document.getElementById("pm25-val").style.color   = p25.color;
  document.getElementById("pm25-grade").textContent = p25.label;
  document.getElementById("pm25-grade").style.color = p25.color;
  document.getElementById("pm10-val").textContent   = d.pm10;
  document.getElementById("pm10-grade").textContent = p10.label;
  document.getElementById("pm10-grade").style.color = p10.color;

  // 날씨
  const [icon, desc] = wxCode(d.wc ?? 0);
  document.getElementById("wx-icon").textContent    = icon;
  document.getElementById("wx-desc").textContent    = desc;
  document.getElementById("val-temp").textContent   = d.temp   != null ? Math.round(d.temp)   : "—";
  document.getElementById("val-feels").textContent  = d.feels  != null ? Math.round(d.feels)  : "—";
  document.getElementById("val-hum").textContent    = d.hum    != null ? Math.round(d.hum)    : "—";
  document.getElementById("val-precip").textContent = d.precip != null ? d.precip.toFixed(1)  : "0.0";
  document.getElementById("val-wind").textContent   = d.wind   != null ? d.wind.toFixed(1)    : "—";

  // 내일
  const [ti, td] = wxCode(d.tmrCode ?? 0);
  document.getElementById("tmr-icon").textContent   = ti;
  document.getElementById("tmr-desc").textContent   = td;
  document.getElementById("tmr-high").textContent   = d.tmrHigh  != null ? Math.round(d.tmrHigh)+"°"  : "—";
  document.getElementById("tmr-low").textContent    = d.tmrLow   != null ? Math.round(d.tmrLow)+"°"   : "—";
  document.getElementById("tmr-rain").textContent   = d.tmrPrecip != null ? d.tmrPrecip.toFixed(1)+"㎜" : "—";

  // 푸터
  document.getElementById("station-name").textContent = d.station ? `📍 ${d.station}` : "";
  const sb = document.getElementById("source-badge");
  sb.style.display = "inline";
  const real = d.source === "실시간";
  sb.textContent = real ? "실시간" : "계절 평균";
  sb.style.color  = real ? "#5BF6A080" : "#F6C15B80";
  sb.style.border = `1px solid ${real ? "#5BF6A030" : "#F6C15B30"}`;
  const n = new Date();
  document.getElementById("updated-text").textContent =
    `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")} 갱신`;

  // 표시
  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.opacity = "1";
}

/* ── fetch ── */
async function tryFetch(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error("HTTP "+r.status);
  const j = await r.json();
  if (j.status !== "ok") throw new Error(j.data);
  return j.data;
}
function tryJsonp(url) {
  return new Promise((res, rej) => {
    const cb = "_w"+Date.now(), s = document.createElement("script");
    const t = setTimeout(() => { delete window[cb]; s.remove(); rej(new Error("timeout")); }, 8000);
    window[cb] = d => { clearTimeout(t); delete window[cb]; s.remove(); d.status==="ok"?res(d.data):rej(new Error(d.data)); };
    s.onerror = () => { clearTimeout(t); delete window[cb]; s.remove(); rej(new Error("err")); };
    s.src = url + "&callback=" + cb;
    document.head.appendChild(s);
  });
}

async function fetchAll() {
  const urls = [
    `https://api.waqi.info/feed/changwon/?token=${WAQI_TOKEN}`,
    `https://api.waqi.info/feed/geo:${LAT};${LON}/?token=${WAQI_TOKEN}`,
  ];
  let aqi = null;
  for (const u of urls) { try { aqi = await tryFetch(u); break; } catch(e) {} }
  if (!aqi) { for (const u of urls) { try { aqi = await tryJsonp(u); break; } catch(e) {} } }

  let wx = null;
  try {
    const r = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
      `&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum` +
      `&timezone=Asia%2FSeoul&forecast_days=2`
    );
    if (r.ok) wx = await r.json();
  } catch(e) {}

  if (aqi) {
    const c   = wx?.current;
    const day = wx?.daily;
    const pm10 = aqi.iaqi?.pm10?.v ?? null;
    const pm25 = aqi.iaqi?.pm25?.v ?? null;
    render({
      aqi:   aqi.aqi,
      pm25:  pm25 ?? 0,
      pm10:  pm10 ?? 0,
      hum:   c?.relative_humidity_2m  ?? aqi.iaqi?.h?.v ?? null,
      temp:  c?.temperature_2m        ?? aqi.iaqi?.t?.v ?? null,
      feels: c?.apparent_temperature  ?? null,
      precip:c?.precipitation         ?? 0,
      wind:  c?.wind_speed_10m != null ? c.wind_speed_10m/3.6 : null,
      wc:    c?.weather_code          ?? 0,
      tmrHigh:  day?.temperature_2m_max?.[1]  ?? null,
      tmrLow:   day?.temperature_2m_min?.[1]  ?? null,
      tmrPrecip:day?.precipitation_sum?.[1]   ?? null,
      tmrCode:  day?.weather_code?.[1]        ?? 0,
      station:  aqi.city?.name ?? "창원",
      source:   "실시간",
    });
  } else {
    render(seasonal());
  }
}

fetchAll();
setInterval(fetchAll, 30*60*1000);

async function keepAwake() {
  try { if ("wakeLock" in navigator) await navigator.wakeLock.request("screen"); } catch(e) {}
}
keepAwake();
document.addEventListener("visibilitychange", () => { if (document.visibilityState==="visible") keepAwake(); });
</script>
</body>
</html>
